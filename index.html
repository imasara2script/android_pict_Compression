<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オフラインWebP圧縮機 (要塞版)</title>
    <link rel="manifest" href="./manifest.json">
    <script>
        const BOOTLOADER_VER = '2.0.0'; // 版数
        const DB_NAME = 'FortressDB';
        
        // ==========================================
        // 1. 防衛メカニズム：版数管理と隔離用コンテナ
        // ==========================================
        async function getSavedCode() {
            const db = await new Promise(r => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onupgradeneeded = (e) => e.target.result.createObjectStore('codes');
                req.onsuccess = (e) => r(e.target.result);
            });
            const data = await new Promise(r => {
                const tx = db.transaction('codes', 'readonly');
                const req = tx.objectStore('codes').get('current_html');
                req.onsuccess = () => r(req.result);
            });
            
            // 版数チェック：不一致なら削除してnullを返す
            if (data && data.version !== BOOTLOADER_VER) {
                console.warn('版数不一致のためコードをパージします');
                await clearStorage();
                return null;
            }
            return data ? data.code : null;
        }

        async function saveCode(code) {
            const db = await new Promise(r => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onsuccess = (e) => r(e.target.result);
            });
            await new Promise(r => {
                const tx = db.transaction('codes', 'readwrite');
                tx.objectStore('codes').put({version: BOOTLOADER_VER, code}, 'current_html');
                tx.oncomplete = r;
            });
        }

        async function clearStorage() {
            const db = await new Promise(r => {
                const req = indexedDB.open(DB_NAME, 1);
                req.onsuccess = (e) => r(e.target.result);
            });
            await new Promise(r => {
                const tx = db.transaction('codes', 'readwrite');
                tx.objectStore('codes').delete('current_html');
                tx.oncomplete = r;
            });
        }

        // ==========================================
        // 2. 死活監視 (Dead-man's Switch)
        // ==========================================
        window.APP_INIT_SUCCESS = false;
        setTimeout(() => {
            if (!window.APP_INIT_SUCCESS) {
                showRecoveryPanel('アプリの起動がタイムアウトしました。');
            }
        }, 5000);

        function showRecoveryPanel(reason) {
            const el = document.createElement('div');
            el.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:#111; color:#ff4a4a; z-index:9999999; display:flex; flex-direction:column; align-items:center; justify-content:center;';
            el.innerHTML = `<h2>⚠️ システム異常</h2><p>${reason}</p><button onclick="location.reload()" style="padding:15px; background:#444; color:#fff; border:none; border-radius:10px;">再起動して復旧</button>`;
            document.body.appendChild(el);
        }

        // ==========================================
        // 3. 隔離起動処理
        // ==========================================
        (async function boot() {
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(console.error);

            const code = await getSavedCode();
            if (!code) return; // 初期UIを表示したまま

            const appRoot = document.getElementById('app-root');
            const bootUI = document.getElementById('bootloader-ui');

            // DOMParserで中身をパースして #app-root に押し込む
            const doc = new DOMParser().parseFromString(code, 'text/html');
            appRoot.innerHTML = doc.body.innerHTML;
            
            // スタイル適用
            const styles = doc.head.getElementsByTagName('style');
            for (let s of styles) document.head.appendChild(s);

            // スクリプト再評価 + 成功フラグセット
            Array.from(appRoot.querySelectorAll('script')).forEach(s => {
                const ns = document.createElement('script');
                ns.textContent = s.textContent;
                document.body.appendChild(ns);
            });

            bootUI.style.display = 'none';
            window.APP_INIT_SUCCESS = true;
        })();
    </script>
</head>
<body style="background:#121212; color:#fff; margin:0;">
    <!-- 隔離コンテナ -->
    <div id="app-root"></div>

    <!-- 初期UI -->
    <div id="bootloader-ui" style="height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
        <h2>オフラインWebP圧縮機 (要塞版)</h2>
        <p>コードを更新してください。</p>
        <button onclick="document.getElementById('update-btn').click()" style="padding:10px; border-radius:5px;">更新モード</button>
    </div>
    <div id="update-btn" style="display:none;" onclick="/* 後で追加 */"></div>
</body>
</html>
